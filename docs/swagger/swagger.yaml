        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get the login history of the authenticated user
      tags:
      - users
  /auth/login:
    post:
      consumes:
      - application/json
      description: In bearer/dual mode, returns a token pair in JSON. In cookie-only
        mode, sets HttpOnly auth cookies and returns {"authenticated":true}.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 2FA required — complete OTP flow
          schema:
            $ref: '#/definitions/handler.OTPRequiredResponse'
        "401":
          description: invalid credentials
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
        "403":
          description: account suspended or not verified
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Authenticate a user
      tags:
      - auth
  /auth/logout:
    post:
      description: Revokes server-side refresh sessions. In cookie/dual mode, also
        clears auth cookies on the client.
      parameters:
      - description: Required in cookie/dual mode
        in: header
        name: X-CSRF-Token
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
        "403":
          description: csrf validation failed
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke all active refresh tokens for the current user
      tags:
      - auth
  /auth/otp/resend:
    post:
      consumes:
      - application/json
      parameters:
      - description: Resend payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.ResendRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Resend the OTP code by email
      tags:
      - auth
  /auth/otp/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: OTP payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.TokenPair'
        "400":
          description: invalid or expired code
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Validate a 2FA OTP code and return a token pair
      tags:
      - auth
  /auth/password/new:
    post:
      consumes:
      - application/json
      parameters:
      - description: Reset payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: invalid or expired token
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Set a new password using a reset token
      tags:
      - auth
  /auth/password/reset:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.SendPasswordResetRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: invalid email
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Send a password reset email
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.RegisterResponse'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
        "409":
          description: email already in use
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/token/refresh:
    post:
      consumes:
      - application/json
      description: Accepts refresh token from JSON body or, in cookie/dual mode, from
        the refresh cookie. In cookie-only mode, rotated tokens are returned via HttpOnly
        cookies.
      parameters:
      - description: Refresh token payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.RefreshTokenRequest'
      - description: Required in cookie/dual mode
        in: header
        name: X-CSRF-Token
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'Cookie mode: tokens are set in HttpOnly cookies'
          schema:
            $ref: '#/definitions/handler.RefreshCookieModeResponse'
        "401":
          description: invalid or expired refresh token
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
        "403":
          description: csrf validation failed
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Rotate a refresh token and return a new token pair
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: Verification payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.VerifyAccountRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: invalid or expired token
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Verify an email address using the token sent by email
      tags:
      - auth
  /auth/verify/resend:
    post:
      consumes:
      - application/json
      parameters:
      - description: Resend payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.ResendRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      summary: Resend the account verification email
      tags:
      - auth
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: all services healthy
          schema:
            $ref: '#/definitions/handler.HealthResponse'
        "503":
          description: one or more services degraded
          schema:
            $ref: '#/definitions/handler.HealthResponse'
      summary: Check the health of the API and its dependencies
      tags:
      - system
  /livez:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.LiveResponse'
      summary: Check API liveness (process is running)
      tags:
      - system
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: ready to receive traffic
          schema:
            $ref: '#/definitions/handler.ReadyResponse'
        "503":
          description: not ready to receive traffic
          schema:
            $ref: '#/definitions/handler.ReadyResponse'
      summary: Check API readiness (dependencies reachable)
      tags:
      - system
securityDefinitions:
  BearerAuth:
    description: 'Format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
