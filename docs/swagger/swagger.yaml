host: localhost:8000
info:
  contact: {}
  description: REST API with authentication, roles and encryption.
  title: Go API Dojo
  version: "1.0"
paths:
  /api/v1/categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all course categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Category'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new category
      tags:
      - categories
  /api/v1/categories/{id}:
    get:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Category'
        "400":
          description: invalid id
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
        "404":
          description: category not found
          schema:
            $ref: '#/definitions/fault.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a category by ID
      tags:
