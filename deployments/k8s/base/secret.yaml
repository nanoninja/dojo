# IMPORTANT: This file is a template. Never commit real secret values.
# Before applying, replace every <base64-encoded-...> placeholder:
#   echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: dojo
type: Opaque
data:
  APP_ENCRYPTION_KEY: <base64-encoded-32-byte-key>
  JWT_SECRET: <base64-encoded-jwt-secret>
  DB_PASSWORD: <base64-encoded-db-password>
  REDIS_PASSWORD: <base64-encoded-redis-password>
  SMTP_PASSWORD: <base64-encoded-smtp-password>
