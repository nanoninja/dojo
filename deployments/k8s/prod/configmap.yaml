apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: dojo
data:
  APP_NAME: "dojo"
  APP_ENV: "production"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"

  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "admin"
  DB_NAME: "dojo"
  DB_SSLMODE: "require"

  REDIS_ADDR: "redis:6379"

  JWT_EXPIRY_HOURS: "24"
  JWT_REFRESH_EXPIRY_DAYS: "7"

  CORS_ALLOWED_ORIGINS: "https://ton-domaine.com"

  SMTP_HOST: "ton-smtp-host"
  SMTP_PORT: "587"
  SMTP_FROM: "noreply@ton-domaine.com"
  MAIL_DISPATCH_ENABLED: "true"
  MAIL_TIMEOUT_MS: "5000"
  MAIL_RETRY_ATTEMPTS: "3"
  MAIL_RETRY_BASE_DELAY_MS: "500"

  AUTH_TRANSPORT_MODE: "dual"
  AUTH_COOKIE_SECURE: "true"
  AUTH_COOKIE_PATH: "/"
  AUTH_COOKIE_SAMESITE: "lax"
  AUTH_COOKIE_ACCESS_NAME: "access_token"
  AUTH_COOKIE_REFRESH_NAME: "refresh_token"
