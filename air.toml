root = "."
tmp_dir = "tmp"

[build]
  cmd        = "go build -o ./tmp/api ./cmd/api"
  bin        = "./tmp/api"
  delay      = 1000
  send_interrupt = true
  kill_delay = 500

  include_ext = ["go", "toml", "env"]
  exclude_dir = ["tmp", "vendor", "deployments", "db"]

[log]
  time = true

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = true
